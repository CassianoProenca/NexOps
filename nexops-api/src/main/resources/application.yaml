spring:
  application:
    name: nexops-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexops}
    username: ${DB_USER:nexops}
    password: ${DB_PASSWORD:nexops_dev_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration/public
    baseline-on-migrate: true
    baseline-version: 0
    default-schema: public

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:nexops}
    password: ${RABBIT_PASSWORD:nexops_dev_pass}

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  security:
    user:
      name: disabled

server:
  port: 8080
  servlet:
    context-path: /api

nexops:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  swagger:
    enabled: ${SWAGGER_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${nexops.swagger.enabled}
  api-docs:
    path: /v3/api-docs
    enabled: ${nexops.swagger.enabled}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
